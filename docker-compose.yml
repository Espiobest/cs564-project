version: "3.9"

services:

  c2-server:
    build: .
    container_name: c2-server
    command: python c2_server.py
    environment:
      OPERATOR_TOKEN: ${OPERATOR_TOKEN:-changeme}
      C2_LOG: /app/logs/c2.log
    ports:
      - "9999:9999"
      - "127.0.0.1:9998:9998"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  exfil-server:
    build: .
    container_name: exfil-server
    command: python exfil_server.py
    ports:
      - "9090:9090"
    volumes:
      - ./exfil:/app/exfil
    restart: unless-stopped

  staging-server:
    image: python:3.11-slim
    container_name: staging-server
    working_dir: /app
    volumes:
      - .:/app:ro
    command: python -m http.server 8080
    ports:
      - "8080:8080"
